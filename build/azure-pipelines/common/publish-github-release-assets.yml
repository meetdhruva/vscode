parameters:
  - name: repository
    type: string
    default: ''
  - name: tag
    type: string
    default: ''
  - name: releaseName
    type: string
    default: ''

steps:
  - download: current
    patterns: |
      vscode_*/**
    displayName: Download installable pipeline artifacts
    condition: and(succeeded(), eq(variables['ASTER_PUBLIC_GITHUB_RELEASE'], 'true'))

  - bash: |
      set -euo pipefail
      node build/azure-pipelines/common/publish-github-release-assets.mjs --assets-root "$(Pipeline.Workspace)"
    displayName: Publish public GitHub release assets
    condition: and(succeeded(), eq(variables['ASTER_PUBLIC_GITHUB_RELEASE'], 'true'))
    env:
      ASTER_GITHUB_RELEASE_REPOSITORY: ${{ parameters.repository }}
      ASTER_GITHUB_RELEASE_TAG: ${{ parameters.tag }}
      ASTER_GITHUB_RELEASE_NAME: ${{ parameters.releaseName }}
      ASTER_GITHUB_RELEASE_TOKEN: $(ASTER_GITHUB_RELEASE_TOKEN)
      VSCODE_QUALITY: $(VSCODE_QUALITY)
